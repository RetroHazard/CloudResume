name: Terraform - Plan Only

defaults:
  run:
    working-directory: infrastructure

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - '!main'
    paths:
      - 'infrastructure/**'

permissions: {}

env:
  GITHUB_TOKEN: ${{ secrets.PAT }}
  TF_VAR_github_token: ${{ secrets.PAT }}
  TF_VAR_deployment_region: ${{ vars.AWS_TF_DEPLOYMENT_REGION }}
  TF_VAR_domain_name: ${{ vars.AWS_TF_DOMAIN_NAME }}
  TF_VAR_sanitized_domain_name: ${{ vars.AWS_TF_SANITIZED_DOMAIN_NAME }}
  TF_VAR_api_current_stage: ${{ vars.AWS_TF_API_CURRENT_STAGE }}

jobs:
  validation:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_TF_DEPLOYMENT_REGION }}
          role-to-assume: ${{ secrets.AWS_TF_OIDC_ROLE }}
          role-session-name: GitHubTerraformValidation

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Initialize
        run: terraform init

      - name: Validate Configuration
        run: terraform validate

  planning:
    runs-on: ubuntu-latest
    needs: validation
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_TF_DEPLOYMENT_REGION }}
          role-to-assume: ${{ secrets.AWS_TF_OIDC_ROLE }}
          role-session-name: GitHubTerraformPlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
          terraform_wrapper: true

      - name: Terraform Init
        id: initialize
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false
