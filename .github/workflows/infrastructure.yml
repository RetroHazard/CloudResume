name: Terraform

defaults:
  run:
    working-directory: infrastructure

on:
  push:
    branches:
      - 'main'
    paths:
      - 'infrastructure/**'

permissions: {}

env:
  GITHUB_TOKEN: ${{ secrets.PAT }}
  TF_VAR_github_token: ${{ secrets.PAT }}
  TF_VAR_deployment_region: ${{ vars.AWS_TF_DEPLOYMENT_REGION }}
  TF_VAR_domain_name: ${{ vars.AWS_TF_DOMAIN_NAME }}
  TF_VAR_sanitized_domain_name: ${{ vars.AWS_TF_SANITIZED_DOMAIN_NAME }}
  TF_VAR_api_current_stage: ${{ vars.AWS_TF_API_CURRENT_STAGE }}

jobs:
  validation:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          aws-region: ${{ vars.AWS_TF_DEPLOYMENT_REGION }}
          role-to-assume: ${{ secrets.AWS_TF_OIDC_ROLE }}
          role-session-name: GitHubTerraformValidation

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: latest

      - name: Initialize
        run: terraform init

      - name: Validate Configuration
        run: terraform validate

  planning:
    runs-on: ubuntu-latest
    needs: validation
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          aws-region: ${{ vars.AWS_TF_DEPLOYMENT_REGION }}
          role-to-assume: ${{ secrets.AWS_TF_OIDC_ROLE }}
          role-session-name: GitHubTerraformPlan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: latest
          terraform_wrapper: true

      - name: Terraform Init
        id: initialize
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false

  deploy:
    runs-on: ubuntu-latest
    needs: planning
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          aws-region: ${{ vars.AWS_TF_DEPLOYMENT_REGION }}
          role-to-assume: ${{ secrets.AWS_TF_OIDC_ROLE }}
          role-session-name: GitHubTerraformApply

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: latest
          terraform_wrapper: true

      - name: Terraform Init
        id: initialize
        run: terraform init

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve

  smoke_tests:
    name: Infrastructure Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions: {}

    steps:
      - name: CloudFront — site returns HTTP 200
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://${{ vars.AWS_TF_DOMAIN_NAME }}/)
          echo "Status: $status"
          [ "$status" = "200" ] || { echo "Expected 200, got $status"; exit 1; }

      - name: Visitors API — returns valid JSON with count
        env:
          API_ENDPOINT: ${{ secrets.AWS_API_ENDPOINT }}
        run: |
          tmpfile=$(mktemp)
          status=$(curl -s -o "$tmpfile" -w "%{http_code}" \
            "$API_ENDPOINT/visitors?visitorId=smoke-test-00000000-0000-0000-0000-000000000000")
          body=$(cat "$tmpfile"); rm -f "$tmpfile"
          echo "Status: $status"
          [ "$status" = "200" ] || { echo "Expected 200, got $status"; exit 1; }
          echo "$body" | jq -e '.count | numbers' > /dev/null \
            || { echo "Missing numeric count field in: $body"; exit 1; }

      - name: Contact API — endpoint is live and secured
        env:
          API_ENDPOINT: ${{ secrets.AWS_API_ENDPOINT }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$API_ENDPOINT/contact")
          echo "Status: $status"
          [[ "$status" =~ ^4[0-9][0-9]$ ]] \
            || { echo "Expected 4xx (origin validation), got $status"; exit 1; }

      - name: S3 — rejects direct public access
        env:
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET_PROD }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://$S3_BUCKET.s3.${{ vars.AWS_TF_DEPLOYMENT_REGION }}.amazonaws.com/")
          echo "Status: $status"
          [ "$status" = "403" ] || { echo "Expected 403 (access denied), got $status"; exit 1; }
